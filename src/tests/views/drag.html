<!doctype html>
<html lang="ru" class="js-drag">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      main {
        padding: 20px;
      }

      .drag-container {
        display: flex;
        flex-direction: column;
        /*gap: 10px;*/
      }

      .drag-component {
        position: relative;

        padding: 30px 20px 20px;
        border: 1px solid #000000;
        border-radius: 10px;
      }

      .drag-component-handle {
        position: absolute;
        top: 10px;
        left: 10px;
      }
    </style>
  </head>

  <body>
    <main>
      <div
        class="js-drag-test drag-container"
        data-faze-drag="container"
        data-faze-drag-group="components"
        data-faze-styles="false"
        data-faze-drag-direction="horizontal"
      >
        <div class="drag-component" data-faze-drag="item">
          <div class="drag-component-handle" data-faze-drag="handle">Handle</div>
          ITEM 1
        </div>
        <div class="drag-component" data-faze-drag="item">
          <div class="drag-component-handle" data-faze-drag="handle">Handle</div>
          ITEM 2
        </div>
        <div class="drag-component" data-faze-drag="item">
          <div class="drag-component-handle" data-faze-drag="handle">Handle</div>
          ITEM 3
        </div>
        <div class="drag-component" data-faze-drag="item">
          <div class="drag-component-handle" data-faze-drag="handle">Handle</div>
          ITEM 4
        </div>
      </div>
    </main>
  </body>
</html>
